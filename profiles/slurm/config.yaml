# Snakemake's maintained SLURM executor profile.
# Adjust partition/account names to match the local cluster before use.

executor: slurm
jobs: 200
latency-wait: 120
rerun-incomplete: true
keep-going: false
printshellcmds: true
slurm-status-command: sacct
slurm-efficiency-report: true

default-resources:
  - mem_mb=8000
  - runtime=240
  - slurm_partition="compute"

set-resources:
  bwa_align_sort_pairs:
    mem_mb: 64000
    runtime: 480
    slurm_partition: "highmem"
  pairtools_dedup:
    mem_mb: 32000
    runtime: 240
  cooler_zoomify:
    mem_mb: 32000
    runtime: 240
  fithichip_run:
    mem_mb: 32000
    runtime: 720
  hicrep_replicate_qc:
    mem_mb: 32000
    runtime: 360
  stripenn_call:
    mem_mb: 48000
    runtime: 480
  differential_loops:
    mem_mb: 32000
    runtime: 360
  export_oracle_cos:
    mem_mb: 48000
    runtime: 240
