# Snakemake SLURM profile
# Usage: snakemake -s workflow/Snakefile --profile profiles/slurm --configfile config/config.yaml
#
# Adjust partition names, memory limits, and account to match your cluster.

executor: cluster-generic
cluster-generic-submit-cmd: >
  sbatch
  --partition={resources.partition}
  --cpus-per-task={threads}
  --mem={resources.mem_mb}M
  --time={resources.walltime}
  --job-name=hichip_{rule}_{wildcards}
  --output=logs/slurm/{rule}_{wildcards}_%j.out
  --error=logs/slurm/{rule}_{wildcards}_%j.err

cluster-generic-cancel-cmd: scancel
cluster-generic-status-cmd: squeue --job {jobid} --noheader --format "%T"

# Default resources — individual rules can override via resources:
default-resources:
  - mem_mb=8000
  - threads=4
  - walltime="04:00:00"
  - partition="compute"

# Per-rule resource overrides
set-resources:
  bwa_align_sort_pairs:
    mem_mb: 64000
    threads: 24
    walltime: "08:00:00"
    partition: "highmem"
  pairtools_dedup:
    mem_mb: 32000
    walltime: "04:00:00"
  cooler_zoomify:
    mem_mb: 32000
    walltime: "04:00:00"
  fithichip_run:
    mem_mb: 32000
    threads: 16
    walltime: "12:00:00"
  export_oracle_cos:
    mem_mb: 48000
    threads: 8
    walltime: "04:00:00"

jobs: 200
latency-wait: 120
rerun-incomplete: true
keep-going: false
printshellcmds: true
