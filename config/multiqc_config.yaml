# MultiQC configuration for ORACLE HiChIP pipeline
# Place this file at the repository root or pass with `multiqc --config`.

title: "ORACLE HiChIP QC Report"
subtitle: "Contacts · matrix balance · assay-stratum anchors · filtered loops · held-out APA · categorical HiCRep"

# Custom sections are emitted as self-contained *_mqc.json files. Keeping their
# schema in the versioned generator prevents this config from drifting away from
# field names or QC thresholds.
custom_content:
  order:
    - balance_qc
    - loop_qc
    - apa_scores

# ── Module order ─────────────────────────────────────────────────────────────
module_order:
  - fastqc
  - fastp
  - custom_content  # balance_qc + loop_qc + apa_scores JSON files
  - general_stats

# ── General settings ─────────────────────────────────────────────────────────
max_table_rows: 500
plots_force_interactive: false
# The workflow publishes the self-contained HTML. Static plot export requires a
# separate Kaleido executable that MultiQC 1.25 does not ship in its environment.
export_plots: false
