# ORACLE HiChIP pipeline configuration
# Override paths per run with --config key=value or a second --configfile.

# ---------- I/O ----------
samples_tsv: config/samples.tsv          # one row per HiChIP sample
genome_yaml: config/genome.yaml          # genome paths + chromsizes
fastq_dir:   "data/fastq"                # input FASTQs
results_dir: "results"                   # all derived outputs

# ---------- Genome ----------
assembly: "hg38"                         # hg38 | T2T-CHM13 | mm10

# ---------- Threads ----------
threads:
  fastqc: 4
  fastp: 8
  bwa: 24
  pairtools: 8
  cooler: 8
  macs3: 4
  fithichip: 16
  diffhic: 8
  stripenn: 8

# ---------- Read QC ----------
fastp:
  quality_cutoff: 20
  length_required: 36
  adapter_sequence: "AGATCGGAAGAGC"            # standard Illumina TruSeq
  adapter_sequence_r2: "AGATCGGAAGAGC"

# ---------- bwa-mem(2) ----------
bwa:
  use_bwamem2: true                            # 2-3x faster than bwa-mem
  flags: "-SP5M"                               # canonical HiC/HiChIP mode

# ---------- pairtools ----------
pairtools:
  min_mapq: 30
  walks_policy: "mask"                         # mask walk pair-types (5end3 etc)
  keep_pair_types: ["UU"]                      # uniquely mapped pairs only

# ---------- cooler ----------
cooler:
  bin_sizes_kb: [5, 10, 25, 50, 100, 250, 500, 1000, 2500]
  oracle_bin_sizes_kb: [5, 25, 100, 1000]      # the 4 ORACLE hierarchy levels
  balance:
    ignore_diags: 2
    min_nnz: 10
    mad_max: 5
    cis_only: false

# ---------- Anchor calling (MACS3, per mark) ----------
# Anchors are called from the HiChIP library itself; no companion ChIP-seq needed.
#
# narrow vs broad follows the ENCODE histone spec. The one that is commonly got
# wrong is H3K4me1: it is BROAD, despite marking enhancers, because its signal is
# a wide bimodal shoulder around the nucleosome-depleted region rather than a
# sharp peak. It was previously listed here as narrow.
#
# Acetylation and H3K4me3 are punctate and stay narrow — calling H3K27ac with
# --broad fuses adjacent enhancers into multi-kb blocks, which for HiChIP is
# actively harmful: the anchors are what loops are anchored on, so fused anchors
# merge distinct enhancer-promoter contacts into one uninterpretable loop.
macs3:
  genome_size: "hs"                            # hs | mm | dm | ce
  # HiChIP read ends are ligation partners, not the two ends of one sonicated
  # fragment: they routinely sit megabases apart or on different chromosomes. So
  # the anchors are called from the read ends treated INDIVIDUALLY, each extended
  # to a nucleosome, rather than as pairs. FitHiChIP's own peak inference does the
  # same (`--nomodel --extsize 147`).
  extsize: 147
  marks:
    H3K4me3:   { mode: "narrow", q: 0.01 }
    H3K4me1:   { mode: "broad",  q: 0.05, broad_cutoff: 0.1 }
    H3K27ac:   { mode: "narrow", q: 0.01 }
    H3K27me3:  { mode: "broad",  q: 0.05, broad_cutoff: 0.1 }
    H3K36me2:  { mode: "broad",  q: 0.05, broad_cutoff: 0.1 }
    H3K36me3:  { mode: "broad",  q: 0.05, broad_cutoff: 0.1 }
    CTCF:      { mode: "narrow", q: 0.01 }
    SMC1A:     { mode: "narrow", q: 0.01 }     # cohesin
    RAD21:     { mode: "narrow", q: 0.01 }     # cohesin

# ---------- FitHiChIP loop calling ----------
fithichip:
  bin_size: 5000                               # 5 kb
  lower_distance: 20000                        # 20 kb
  upper_distance: 3000000                      # 3 Mb
  fdr_threshold: 0.01
  interaction_type: "Peak-to-ALL"              # human-readable label for reports
  background_type: "Coverage_Bias"             # human-readable label for reports
  # FitHiChIP native codes. Keeping them explicit avoids silent mismatch between
  # human labels and FitHiChIP's historical INI keys.
  int_type_code: 3                              # current project default: Peak-to-ALL
  bias_type_code: 1                             # coverage-bias correction
  use_p2p_background: 1
  min_reads: 6                                  # downstream reporting threshold
  # Take the merged call set. FitHiChIP writes TWO results: the raw significant bin
  # pairs, and -- under Merge_Nearby_Interactions/ -- the same set with adjacent
  # significant bin pairs collapsed into one contact. The raw set reports one
  # physical loop several times, once per adjacent bin pair it spans. Measured on
  # Th17_H3K27ac_rep1: 30,903 raw against 17,875 merged, so 42% of the raw calls are
  # redundant. Feeding the raw set to the differential test inflates the loop count
  # and enters the same interaction into DESeq2 repeatedly.
  #
  # Setting MergeInt=1 alone is NOT enough -- that only makes FitHiChIP write the
  # merged file; you have to read it.
  merge_nearby: true

# ---------- Replicate QC ----------
# Replicates are same cell type, same mark, different donor (see rules/06_loop_qc.smk).
#
# SCC is depth-dominated, and on a HiChIP matrix that matters more than it does on
# Hi-C. HiCRep downsamples the deeper library to the shallower one's contact count,
# so a pair is only as good as its worst member. Measured on this cohort at 25 kb:
# two libraries from DIFFERENT cell types (90.8M and 47.6M contacts) score 0.743,
# whereas two true replicates score 0.221 when one of them holds only 3.0M. An
# absolute SCC cutoff would therefore have failed a real replicate pair and passed a
# cross-cell-type pair -- it grades sequencing depth, not concordance.
#
# So: 0.85 (a Hi-C convention, and unreachable on an anchor-restricted HiChIP matrix)
# is replaced by a floor that says "this looks like a contact map", and any pair whose
# shallower member is under min_contacts_for_scc is reported as depth-confounded and
# is not allowed to decide PASS/FAIL.
hicrep:
  bin_size: 25000                              # 25 kb is HiCRep's sweet spot
  max_dist: 5000000                            # 5 Mb stratification
  h_smooth: 1
  threshold_pass: 0.70                         # sanity floor, not a concordance claim
  min_contacts_for_scc: 10000000               # below this, SCC reports depth

# ---------- APA ----------
# The APA score is taken against the random-shift control, which moves both anchors
# by the same offset and therefore preserves the loop's genomic separation. The
# corner ratio is reported too, but it is not what decides pass/fail: contact
# frequency inside the window is a function of distance from the diagonal, so
# corners at different (j - i) are not comparable to the centre pixel.
apa:
  # A 21x21-pixel window at 10 kb -- the standard APA geometry (Rao 2014), not an
  # arbitrary choice. It was +/-20 bins, which is what forced the distance floor below
  # up to 410 kb to keep the diagonal out, and 410 kb discards the median loop.
  window_size: 10                              # ± 10 bins around loop centre
  bin_size: 10000
  # >= (2*window + 1) * bin_size, or the main diagonal sits inside the window and the
  # aggregate is a picture of the diagonal rather than of the loops. apa_plot enforces
  # this floor in code and logs how many loops it drops; the value here must satisfy
  # it or it is raised. At window=10 / bin=10000 the floor is 210 kb.
  min_loop_dist: 210000
  n_random_controls: 5                         # random-shift controls per loop
  score_min: 1.5                               # centre / random-shift centre
  # Below this many usable loops the sample is NOT_ASSESSED rather than scored. A
  # ratio built from one loop cannot fail: Naive_H3K27ac_rep1 keeps a single loop
  # after the distance filter and scored 4.9 million, reported as a PASS.
  min_loops_for_apa: 20

# ---------- Differential loops ----------
# Differential analysis must be stratified by mark, tissue, protocol and batch-aware
# where possible. Leave comparisons empty until real matched case/control samples
# exist for the same mark and tissue class.
differential:
  fdr: 0.05
  log2fc_min: 1.0
  method: "pyDESeq2"                           # pyDESeq2 | diffhic_r
  # CD4+ T-helper subsets, same mark (H3K27ac), same protocol, same donors.
  # Th17 vs Treg is the substantive axis: the two subsets are developmentally
  # adjacent and reciprocally polarising, and the autoimmune GWAS variants that
  # motivate this dataset fall in enhancers whose target genes differ between
  # them. Naive is the common ancestor and serves as the reference for both.
  #
  # CTCF is deliberately absent from every comparison. It exists in this cohort in
  # naive cells only, so there is no contrast to make, and comparing loops called
  # on a CTCF anchor set against loops called on an H3K27ac anchor set would
  # compare anchor definitions rather than biology.
  comparisons:
    - name: Th17_vs_Naive_H3K27ac
      mark: H3K27ac
      case_filter:    { cell_type: Th17 }
      control_filter: { cell_type: Naive }
    - name: Treg_vs_Naive_H3K27ac
      mark: H3K27ac
      case_filter:    { cell_type: Treg }
      control_filter: { cell_type: Naive }
    - name: Th17_vs_Treg_H3K27ac
      mark: H3K27ac
      case_filter:    { cell_type: Th17 }
      control_filter: { cell_type: Treg }

# ---------- Architectural stripes ----------
# Stripes (architectural / flame patterns) are the signature of one anchor
# reeling in a whole domain by loop extrusion, and they are not recoverable from
# a loop list: a loop caller tests discrete pixel pairs, whereas a stripe is a
# continuous line of enrichment anchored at one end. Banecki et al. (Commun Biol
# 2025) make stripe detection a first-class output of HiChIP analysis; this
# pipeline previously had no equivalent.
#
# Read on a CTCF/cohesin anchor set they are directly interpretable as extrusion
# anchors. On H3K27ac they are weaker and are reported, not leaned on.
stripes:
  enabled: true
  resolution: 10000                             # 10 kb; 5 kb is too sparse per-pixel
  max_pixel_pval: 0.1
  # min_length / max_width are given in BASE PAIRS here and converted to bins by the
  # rule. stripenn's own --minL/--maxW are in BINS, not bp: minL feeds minH, and maxW
  # is compared against bin indices (`abs(m - n) <= self.maxW`). Passing bp straight
  # through asked for a 200 Mb minimum stripe length -- longer than any human
  # chromosome -- so nothing could ever be called.
  #
  # The values are stripenn's validated defaults (minL=10 bins, maxW=8 bins) restated
  # at this resolution. 100 kb is also the right floor biologically: a stripe shorter
  # than that is not distinguishable from the loop it is anchored on.
  min_length: 100000                            # 10 bins at 10 kb
  max_width: 80000                              # 8 bins at 10 kb
  canny_sigma: 2.0
  # Raw counts, stated explicitly rather than arrived at by accident.
  #
  # stripenn is an IMAGE method: it saturates the contact map at a percentile, clips
  # to [0,1] and runs Canny edge detection. cooler's ICE balancing leaves NaN in
  # every unmappable bin -- 24.2% of the chr1 matrix here, with 3,224 rows entirely
  # NaN -- and NaN survives the clip, so Canny finds no edges and the caller returns
  # zero stripes genome-wide. Measured on Naive_CTCF_rep1, chr1, identical thresholds:
  #
  #     --norm weight  ->   0 candidates,  0 stripes
  #     --norm None    ->  55 candidates, 38 stripes
  #
  # This is by design, not a defect: stripenn's own matrix handle is `unbalLib`, and
  # it controls coverage bias with the per-chromosome percentile saturation plus a
  # background null model and a p-value, not by balancing the matrix.
  #
  # Its default is KR, which is not a column in a cooler-balanced file. That does not
  # fail -- it prints "Normalization method is forced to None" and silently uses raw
  # counts anyway. Naming None here gets the same matrix by choice, and means a
  # future cooler that DOES carry a KR column cannot silently change the answer.
  norm: "None"

# ---------- Visualisation regions of interest ----------
# The loci that decide whether the experiment worked. For CD4 T-helper subsets
# these are the lineage-defining genes: if the Th17 enhancer connectome does not
# differ from Treg at RORC/IL17A and Treg does not differ from Th17 at
# FOXP3/IL2RA/CTLA4, then either the cells were not polarised or the HiChIP
# failed, and nothing else in the analysis is worth reading. MYC is the shared
# positive control — it is looped in every T cell.
#
# Coordinates are the GENCODE v46 gene body padded by 500 kb, generated from the
# GTF rather than typed by hand.
viz:
  regions:
    - { name: "RORC_locus",  chrom: "chr1",  start: 151306071, end: 152331845 }  # Th17 master TF
    - { name: "IL17A_locus", chrom: "chr6",  start: 51686375,  end: 52690638 }   # Th17 effector
    - { name: "FOXP3_locus", chrom: "chrX",  start: 48750438,  end: 49764800 }   # Treg master TF
    - { name: "IL2RA_locus", chrom: "chr10", start: 5510689,   end: 6562370 }    # Treg, CD25
    - { name: "CTLA4_locus", chrom: "chr2",  start: 203353888, end: 204373965 }  # Treg effector
    - { name: "MYC_locus",   chrom: "chr8",  start: 127235434, end: 128242951 }  # shared control

# ---------- ORACLE COS export ----------
oracle_export:
  output_format: "pyg"                         # pyg | h5
  emit_bigwigs: true                           # reserved for future signal-channel expansion
  # The ENCODE blacklist is taken from config/genome.yaml (per-assembly `blacklist`),
  # so it stays consistent with the chosen assembly. Bins overlapping blacklist
  # regions have their peak-overlap node feature zeroed during COS export.
  microbiome_metadata_tsv: "config/microbiome_tokens.tsv"   # optional; one row per sample
  drop_chromosomes: ["chrM", "chrY"]
