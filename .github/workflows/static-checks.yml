name: static-checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-and-config-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install check dependencies
        run: |
          python -m pip install \
            "pyyaml==6.*" "pytest==8.*" "snakemake==8.30.*" \
            "cooler==0.10.*" "h5py==3.11.*" \
            "numpy==1.26.*" "pandas==2.2.*" "pyBigWig==0.3.22" \
            "ruff==0.15.*"

      - name: Lint Python sources and tests
        run: ruff check workflow/scripts tests

      - name: Compile Python helper scripts
        run: |
          python -m py_compile $(find workflow/scripts -name '*.py' | sort)

      - name: Confirm expected entrypoints exist
        run: |
          test -f Snakefile
          test -f workflow/Snakefile
          test -f config/config.yaml
          test -f config/samples.tsv
          test -f config/genome.yaml

      - name: Confirm workflow components exist
        run: |
          test -f workflow/rules/05_loops_fithichip.smk
          test -f workflow/rules/07_differential.smk
          test -f workflow/scripts/export_oracle_cos.py
          test -f workflow/scripts/cooltools_eigs_cis.py
          test -f config/multiqc_config.yaml
          test -f resources/download_resources.sh
          test -f profiles/slurm/config.yaml
          test -f TUTORIAL.md

      - name: Verify dead code removed
        run: |
          # insulation_compartments.py was an orphaned script — must not exist
          test ! -f workflow/scripts/insulation_compartments.py

      - name: Check no '|| true' on output-producing steps
        run: |
          # '|| true' silently swallows failures in output steps — forbidden
          if grep -rnE '^[[:space:]]*[^#[:space:]].*\|\|[[:space:]]*true' workflow/rules/; then
            echo "ERROR: '|| true' found in rule files — remove it"; exit 1
          fi

      - name: Run focused workflow tests
        run: |
          pytest -q tests

      - name: Parse the complete workflow
        run: |
          snakemake --snakefile workflow/Snakefile --cores 1 --list-rules

      - name: Validate YAML and CFF syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted([*Path('.').rglob('*.yaml'), *Path('.').rglob('*.yml'), Path('CITATION.cff')]):
              if any(part.startswith('.') and part != '.github' for part in path.parts):
                  continue
              with path.open() as handle:
                  yaml.safe_load(handle)
              print(path)
          PY

      - name: Check shell entrypoints are syntax-valid
        run: |
          bash -n setup.sh
          bash -n setup_env.sh
          bash -n run.sh
          bash -n test.sh
          bash -n prepare_references.sh
          bash -n resources/download_resources.sh
