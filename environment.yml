# ORACLE HiChIP analysis environment
# Build with: mamba env create -f environment.yml -n oracle-hichip
# CPU-only users: remove pytorch-cuda and install the CPU PyTorch build instead.
name: oracle-hichip
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.11

  # ----- Workflow & infra -----
  - snakemake-minimal=8.*
  - snakemake-wrapper-utils
  - pulp
  - mamba
  - graphviz
  - jupyterlab
  - ipykernel
  - black
  - ruff
  - mypy

  # ----- Read QC & trim -----
  - fastqc=0.12.*
  - fastp=0.23.*
  - multiqc=1.25.*

  # ----- Alignment & pairs -----
  - bwa=0.7.*
  - bwa-mem2=2.2.*
  - samtools=1.20.*
  - pairtools=1.1.*
  - htslib=1.20.*

  # ----- Matrix building / cool -----
  - cooler=0.10.*
  - cooltools=0.7.*
  - pairix=0.3.*

  # ----- Peak calling (1D) -----
  - macs2=2.2.*
  - bedtools=2.31.*
  - ucsc-bedclip
  - ucsc-bedgraphtobigwig

  # ----- HiChIP loop calling -----
  - fithichip
  - mustache-hic
  - hicexplorer=3.7.*

  # ----- Replicate / matrix QC -----
  # NB: the QC script imports the `hicrep` PyPI package API
  # (`from hicrep import hicrepSCC`, `hicrep.utils.readMcool`), which is a
  # DIFFERENT project from conda's `hicreppy`. Install `hicrep` via pip below.
  - pip

  # ----- Differential loops (R side fallback) -----
  - r-base=4.4.*
  - bioconductor-diffhic
  - bioconductor-deseq2
  - bioconductor-edger
  - bioconductor-genomicinteractions
  - bioconductor-genomicranges
  - bioconductor-rtracklayer

  # ----- Annotation -----
  - bioconductor-chipseeker
  - bioconductor-clusterprofiler
  - bioconductor-org.hs.eg.db
  - bioconductor-txdb.hsapiens.ucsc.hg38.knowngene
  - gffread
  - pyranges=0.1.*
  - pybigwig=0.3.*
  - pyfaidx=0.8.*

  # ----- Visualisation -----
  - pygenometracks=3.9.*
  - matplotlib=3.9.*
  - seaborn=0.13.*
  - bioframe=0.7.*
  - plotnine

  # ----- Scientific Python -----
  - numpy=1.26.*
  - scipy=1.13.*
  - pandas=2.2.*
  - pyarrow
  - h5py=3.11.*
  - hdf5=1.14.*
  - scikit-learn=1.5.*
  - statsmodels
  - networkx
  - intervaltree
  - tqdm

  # ----- ORACLE COS export (PyTorch Geometric) -----
  - pytorch=2.4.*
  - pytorch-cuda=12.1
  - pyg=2.6.*
  - pytorch-scatter
  - pytorch-sparse
  - pytorch-cluster

  # ----- pip-only -----
  - pip:
      - pyDESeq2==0.4.*
      - hicrep                 # provides hicrepSCC + hicrep.utils.readMcool (used by hicrep_replicate_qc.py)
      - higlass-python==1.2.*
      - clodius
